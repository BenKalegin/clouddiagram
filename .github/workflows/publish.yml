name: Publish clouddiagram-editor to GitHub Packages

on:
  push:
    tags:
      - 'editor-v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: react/pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: '@benkalegin'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:lib

      - run: pnpm build:editor:types

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
